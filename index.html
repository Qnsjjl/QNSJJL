        /* --- 全局样式设置 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f7fbf7; /* 极浅的绿色背景 */
            color: #444;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* --- 顶部装饰树叶 (CSS绘制) --- */
        .leaves-top-left {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 0% 0%, #a3d9a5 0%, transparent 60%);
            border-radius: 0 0 100% 0;
            opacity: 0.6;
            z-index: -1;
        }
        .leaves-top-right {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 100% 0%, #a3d9a5 0%, transparent 60%);
            border-radius: 0 0 0 100%;
            opacity: 0.6;
            z-index: -1;
        }

        /* --- 主容器 --- */
        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 60px;
            margin-bottom: 60px;
            text-align: center;
            z-index: 1;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #666;
            font-size: 1rem;
            margin-bottom: 50px;
            font-weight: normal;
        }

        /* --- 双列布局 --- */
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 左右两列 */
            gap: 40px;
            text-align: left;
        }

        /* 手机端适配：变为单列 */
        @media (max-width: 768px) {
            .grid-wrapper {
                grid-template-columns: 1fr;
            }
        }

        /* --- 单个板块样式 --- */
        .section-block {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }

        .section-block:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.9);
        }

        /* 主链接（文件夹名） */
        .main-link {
            display: block;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2e7d32;
            text-decoration: none;
            margin-bottom: 10px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        .main-link:hover {
            color: #1b5e20;
            border-bottom-color: #1b5e20;
        }

        /* 子链接列表（1.html, 2.html...） */
        .sub-links {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 10px;
        }

        .sub-links li a {
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 28px;
            text-align: center;
            background-color: #e8f5e9;
            color: #2e7d32;
            border-radius: 50%;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .sub-links li a:hover {
            background-color: #2e7d32;
            color: white;
        }

        /* 底部版权/提示 */
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
