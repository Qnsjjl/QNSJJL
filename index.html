<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姥姥的树存档</title>
    <style>
        /* --- 基础样式 --- */
        body { margin: 0; padding: 0; font-family: "Microsoft YaHei", sans-serif; background-color: #f5f7fa; display: flex; height: 100vh; overflow: hidden; }

        /* 左侧侧边栏 (目录) */
        #sidebar {
            width: 260px;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* 顶部大标题区域 */
        .main-title-box {
            padding: 20px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
        .main-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        /* 目录列表容器 */
        #nav-list {
            flex: 1;
            overflow-y: auto; /* 允许滚动 */
            padding: 10px 0;
        }

        /* 每一个小标题条目 */
        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 4px solid transparent;
            color: #555;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-item:hover {
            background-color: #f0f7ff;
            color: #1890ff;
        }

        /* 选中状态 */
        .nav-item.active {
            background-color: #e6f7ff;
            color: #1890ff;
            border-left-color: #1890ff;
            font-weight: bold;
        }

        /* 右侧内容显示区 */
        #content-area {
            flex: 1;
            position: relative;
            background-color: #fafafa;
        }

        /* iframe 用于显示子页面 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 翻页控制条 (悬浮在iframe上方) */
        .page-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            display: flex;
            gap: 10px;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .page-btn {
            background: #1890ff;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .page-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .page-info {
            font-size: 12px;
            color: #666;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 60px; flex-direction: row; border-right: none; border-bottom: 1px solid #ddd; }
            .main-title-box { display: none; } /* 手机上隐藏大标题省空间 */
            #nav-list { display: flex; overflow-x: auto; padding: 0; }
            .nav-item { white-space: nowrap; border-left: none; border-bottom: 4px solid transparent; padding: 15px; }
            .nav-item.active { border-left: none; border-bottom-color: #1890ff; }
        }
    </style>
</head>
<body>

    <!-- 左侧目录 -->
    <div id="sidebar">
        <div class="main-title-box">
            <h1 class="main-title">姥姥的树存档</h1>
        </div>
        <div id="nav-list">
            <!-- JS 将在这里生成目录 -->
        </div>
    </div>

    <!-- 右侧内容 -->
    <div id="content-area">
        <iframe id="main-frame" src=""></iframe>

        <!-- 翻页按钮 -->
        <div class="page-controls">
            <button class="page-btn" id="prev-btn" onclick="changePage(-1)">上一页</button>
            <span class="page-info" id="page-indicator">第 1 / 1 页</span>
            <button class="page-btn" id="next-btn" onclick="changePage(1)">下一页</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 核心配置区：严格按照您的要求排列
        // pages: 代表该文件夹下有几个html文件 (1.html, 2.html...)
        // ==========================================
        const archiveData = [
            { title: "史官楼", folder: "史官楼", pages: 2 },
            { title: "吵架1", folder: "吵架1", pages: 3 },
            { title: "吵架2", folder: "吵架2", pages: 3 },
            { title: "吵架3", folder: "吵架3", pages: 1 },
            { title: "吵架4", folder: "吵架4", pages: 1 },
            { title: "姥组吵架整理", folder: "姥组吵架整理", pages: 1 },
            { title: "苹果凌晨出没", folder: "苹果凌晨出没", pages: 1 },
            { title: "建议楼", folder: "建议楼", pages: 1 },
            { title: "组务投票楼", folder: "组务投票楼", pages: 1 },
            { title: "管理员留任投票楼", folder: "管理员留任投票楼", pages: 1 },
            { title: "投票2号", folder: "投票2号", pages: 1 },
            { title: "管理组群内", folder: "管理组群内", pages: 1 },
            { title: "三天后狐狸第一次现身组内", folder: "三天后狐狸第一次现身组内", pages: 1 },
            { title: "组员发帖1", folder: "组员发帖1", pages: 2 },
            { title: "苹果现身组内", folder: "苹果现身组内", pages: 2 } // 已修正为 2 页
        ];

        let currentIndex = 0; // 当前选中的章节索引
        let currentPage = 1;  // 当前章节内的页码

        const navListEl = document.getElementById('nav-list');
        const frameEl = document.getElementById('main-frame');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const indicatorEl = document.getElementById('page-indicator');

        // 初始化
        function init() {
            renderNav();
            loadContent(0, 1); // 默认加载第一个
        }

        // 渲染左侧目录
        function renderNav() {
            navListEl.innerHTML = '';
            archiveData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'nav-item';
                div.innerText = item.title;
                div.onclick = () => loadContent(index, 1); // 点击切换章节，重置为第1页
                div.id = `nav-${index}`;
                navListEl.appendChild(div);
            });
        }

        // 加载具体内容
        function loadContent(index, page) {
            // 边界检查
            if (index < 0 || index >= archiveData.length) return;

            currentIndex = index;
            currentPage = page;
            const data = archiveData[index];

            // 1. 更新目录高亮
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${index}`);
            if(activeNav) {
                activeNav.classList.add('active');
                activeNav.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            // 2. 设置 iframe 地址
            // 假设结构是：根目录/文件夹名/页码.html
            const url = `${data.folder}/${page}.html`;
            frameEl.src = url;

            // 3. 更新翻页按钮状态
            updateControls(data.pages);
        }

        // 翻页逻辑
        function changePage(delta) {
            const data = archiveData[currentIndex];
            const newPage = currentPage + delta;

            if (newPage >= 1 && newPage <= data.pages) {
                loadContent(currentIndex, newPage);
            }
        }

        // 更新按钮显示
        function updateControls(totalPages) {
            indicatorEl.innerText = `第 ${currentPage} / ${totalPages} 页`;
            prevBtn.disabled = (currentPage <= 1);
            nextBtn.disabled = (currentPage >= totalPages);
        }

        // 启动
        init();
    </script>
</body>
</html>
